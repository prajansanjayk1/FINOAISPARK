apiVersion: apps/v1
kind: Deployment
metadata:
  name: finspark-pam-deployment
  labels:
    app: finspark-pam
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: finspark-pam
  template:
    metadata:
      labels:
        app: finspark-pam
    spec:
      containers:
      - name: pam-engine
        image: finspark/pam-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PROJECT_NAME
          value: "FinSpark Banking PAM"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: finspark-secrets
              key: database-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: finspark-secrets
              key: jwt-secret-key
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
        resources:
          limits:
            cpu: "1.0"
            memory: 1024Mi
          requests:
            cpu: "0.2"
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: finspark-pam-service
spec:
  selector:
    app: finspark-pam
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

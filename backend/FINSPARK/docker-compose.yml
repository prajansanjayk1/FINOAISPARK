version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: finspark_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: finspark_pam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finspark_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: finspark_web
    restart: always
    environment:
      - PROJECT_NAME=FinSpark Banking PAM
      - API_V1_STR=/api/v1
      - SECRET_KEY=PROD_SECRET_KEY_FOR_JWT_GENERATION_NIST_COMPLIANT_256_BITS_MINIMUM
      - ALGORITHM=HS256
      - DATABASE_URL=postgresql+asyncpg://postgres:SecretPassword123!@db:5432/finspark_pam
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_PROVIDER_TYPE=MOCK
      - ENFORCE_IP_WHITELIST=true
      - ENFORCE_DEVICE_TRUST=true
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: finspark_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

  prometheus:
    image: prom/prometheus:latest
    container_name: finspark_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - web

volumes:
  pgdata:
